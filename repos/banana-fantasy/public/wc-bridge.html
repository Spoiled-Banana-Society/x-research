<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script type="module">
const { EthereumProvider } = await import('https://esm.sh/@walletconnect/ethereum-provider@2.22.4');

let currentProvider = null;

window.addEventListener('message', async (event) => {
  if (event.data?.type !== 'wc-connect') return;

  const { walletId } = event.data;

  try {
    // Disconnect previous session
    if (currentProvider) {
      try { await currentProvider.disconnect(); } catch {}
    }

    const showModal = walletId === 'walletconnect';

    const provider = await EthereumProvider.init({
      projectId: '34357d3c125c2bcf2ce2bc3309d98715',
      optionalChains: [1, 8453],
      showQrModal: showModal,
      metadata: {
        name: 'Banana Fantasy',
        description: 'Onchain Fantasy Football',
        url: event.origin,
        icons: [event.origin + '/icons/icon-192.png'],
      },
    });

    currentProvider = provider;

    if (!showModal) {
      // For specific wallets — send URI back for deep linking
      provider.on('display_uri', (uri) => {
        window.parent.postMessage({ type: 'wc-uri', uri, walletId }, '*');
      });
    }

    provider.connect().then(async () => {
      const accounts = await provider.request({ method: 'eth_accounts' });
      window.parent.postMessage({ type: 'wc-connected', accounts, walletId }, '*');
    }).catch(err => {
      window.parent.postMessage({ type: 'wc-error', error: err.message }, '*');
    });

  } catch(err) {
    window.parent.postMessage({ type: 'wc-error', error: err.message }, '*');
  }
});

// Signal ready
window.parent.postMessage({ type: 'wc-ready' }, '*');
</script>
</body>
</html>
